# rsyslog basic configuration (structured)
# Purpose: Minimal working setup using explicit inputs, rulesets, and actions
# Flow:
# Input → Ruleset → Action

#################
# MODULES
#################

module(load="imuxsock")   # local system logging (/dev/log)
module(load="imklog")     # kernel logging

#################
# GLOBAL SETTINGS
#################

global(
    workDirectory="/var/spool/rsyslog"
)

#################
# TEMPLATES
#################

template(name="TraditionalFormat" type="string"
         string="%TIMESTAMP% %HOSTNAME% %syslogtag%%msg%\n")

#################
# RULESET
#################

ruleset(name="local_logs") {

    # General system logs
    if ($syslogfacility-text != "auth" and $syslogfacility-text != "authpriv") then {
        action(
            type="omfile"
            file="/var/log/syslog"
            template="TraditionalFormat"
        )
    }

    # Authentication logs
    if ($syslogfacility-text == "auth" or $syslogfacility-text == "authpriv") then {
        action(
            type="omfile"
            file="/var/log/auth.log"
            template="TraditionalFormat"
        )
    }

    # Kernel logs
    if ($syslogfacility-text == "kern") then {
        action(
            type="omfile"
            file="/var/log/kern.log"
            template="TraditionalFormat"
        )
    }

    # Mail logs
    if ($syslogfacility-text == "mail") then {
        action(
            type="omfile"
            file="/var/log/mail.log"
            template="TraditionalFormat"
        )
    }

    # Cron logs
    if ($syslogfacility-text == "cron") then {
        action(
            type="omfile"
            file="/var/log/cron.log"
            template="TraditionalFormat"
        )
    }

    # Emergency messages to all users
    if ($syslogseverity-text == "emerg") then {
        action(type="omusrmsg" users="*")
    }
}

#################
# INPUTS
#################

# Local system logs
input(
    type="imuxsock"
    Socket="/dev/log"
    ruleset="local_logs"
)

# Kernel logs
input(
    type="imklog"
    ruleset="local_logs"
)

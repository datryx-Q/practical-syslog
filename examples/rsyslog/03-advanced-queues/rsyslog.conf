# =============================================================================
# Example 03 - Advanced Queue Configuration
#
# Purpose:
# Demonstrate memory and disk-assisted queues for reliable delivery
# during downstream outages and high-volume conditions.
#
# =============================================================================

# -----------------------------------------------------------------------------
# Input Modules
# -----------------------------------------------------------------------------

module(load="imuxsock")
module(load="imklog")

# -----------------------------------------------------------------------------
# Global Configuration
# -----------------------------------------------------------------------------

global(
    workDirectory="/var/spool/rsyslog"
)

# -----------------------------------------------------------------------------
# Main Queue Configuration
# -----------------------------------------------------------------------------

main_queue(
    queue.type="LinkedList"
    queue.filename="mainq"
    queue.saveOnShutdown="on"

    queue.size="100000"
    queue.dequeueBatchSize="100"

    queue.workerThreads="4"

    queue.highWatermark="80000"
    queue.lowWatermark="20000"

    queue.maxDiskSpace="5g"

    queue.checkpointInterval="1000"
)

# -----------------------------------------------------------------------------
# Local Log Storage
# -----------------------------------------------------------------------------

action(
    type="omfile"
    file="/var/log/messages"
)

# -----------------------------------------------------------------------------
# Remote Forwarding Action
# -----------------------------------------------------------------------------

action(
    type="omfwd"

    target="192.168.1.100"
    port="514"
    protocol="tcp"

    action.resumeRetryCount="-1"

    queue.type="LinkedList"
    queue.filename="remote-forward"

    queue.size="50000"
    queue.maxDiskSpace="2g"

    queue.saveOnShutdown="on"

    queue.highWatermark="40000"
    queue.lowWatermark="10000"
)

# -----------------------------------------------------------------------------
# End Configuration
# -----------------------------------------------------------------------------

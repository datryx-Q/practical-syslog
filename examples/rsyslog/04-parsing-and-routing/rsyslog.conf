# =============================================================================
# Example 04 - Parsing and Routing
#
# Purpose:
# Demonstrate content-based routing using rsyslog properties.
#
# This example separates logs into different files based on:
#   - Program name
#   - Severity
#   - Message content
#
# =============================================================================

# -----------------------------------------------------------------------------
# Input Modules
# -----------------------------------------------------------------------------

module(load="imuxsock")
module(load="imklog")

# -----------------------------------------------------------------------------
# Global Configuration
# -----------------------------------------------------------------------------

global(
    workDirectory="/var/spool/rsyslog"
)

# -----------------------------------------------------------------------------
# Templates
# -----------------------------------------------------------------------------

template(
    name="StandardFormat"
    type="string"
    string="%timegenerated% %hostname% %syslogtag%%msg%\n"
)

# -----------------------------------------------------------------------------
# SSH Logs
# -----------------------------------------------------------------------------

if $programname == "sshd" then {
    action(
        type="omfile"
        file="/var/log/ssh.log"
        template="StandardFormat"
    )
    stop
}

# -----------------------------------------------------------------------------
# Sudo Logs
# -----------------------------------------------------------------------------

if $programname == "sudo" then {
    action(
        type="omfile"
        file="/var/log/sudo.log"
        template="StandardFormat"
    )
    stop
}

# -----------------------------------------------------------------------------
# Authentication Failures
# -----------------------------------------------------------------------------

if ($msg contains "Failed password") then {
    action(
        type="omfile"
        file="/var/log/auth-failures.log"
        template="StandardFormat"
    )
}

# -----------------------------------------------------------------------------
# Error Messages
# -----------------------------------------------------------------------------

if ($syslogseverity <= 3) then {
    action(
        type="omfile"
        file="/var/log/errors.log"
        template="StandardFormat"
    )
}

# -----------------------------------------------------------------------------
# Catch-All
# -----------------------------------------------------------------------------

action(
    type="omfile"
    file="/var/log/messages"
    template="StandardFormat"
)

# -----------------------------------------------------------------------------
# End Configuration
# -----------------------------------------------------------------------------

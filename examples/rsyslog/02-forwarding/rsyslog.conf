# =============================================================================
# Example 02 - Basic Syslog Forwarding
#
# Purpose:
# Demonstrate forwarding local logs to a remote syslog server.
#
# This example uses TCP forwarding for improved reliability compared
# to traditional UDP forwarding.
#
# =============================================================================

# Load local logging input

module(load="imuxsock")
module(load="imklog")

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------

global(
    workDirectory="/var/spool/rsyslog"
)

# -----------------------------------------------------------------------------
# Local Storage
# -----------------------------------------------------------------------------

action(
    type="omfile"
    file="/var/log/messages"
)

# -----------------------------------------------------------------------------
# Remote Forwarding
# -----------------------------------------------------------------------------

action(
    type="omfwd"
    target="192.168.1.100"
    port="514"
    protocol="tcp"

    action.resumeRetryCount="-1"

    queue.type="linkedList"
    queue.filename="forwarding"
    queue.saveonshutdown="on"
)

# -----------------------------------------------------------------------------
# End Configuration
# -----------------------------------------------------------------------------

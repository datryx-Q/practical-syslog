# =============================================================================
# Example 05 - Reliable Forwarding
#
# Purpose:
# Demonstrate production-oriented log forwarding using:
#   - TCP transport
#   - Action queues
#   - Disk-assisted buffering
#   - Infinite retries
#
# This configuration is designed to survive temporary network outages
# and collector downtime without immediately losing logs.
#
# =============================================================================

# -----------------------------------------------------------------------------
# Input Modules
# -----------------------------------------------------------------------------

module(load="imuxsock")
module(load="imklog")

# -----------------------------------------------------------------------------
# Global Configuration
# -----------------------------------------------------------------------------

global(
    workDirectory="/var/spool/rsyslog"
)

# -----------------------------------------------------------------------------
# Main Queue
# -----------------------------------------------------------------------------

main_queue(
    queue.type="LinkedList"
    queue.filename="mainq"
    queue.saveOnShutdown="on"

    queue.size="100000"

    queue.maxDiskSpace="5g"

    queue.highWatermark="80000"
    queue.lowWatermark="20000"
)

# -----------------------------------------------------------------------------
# Local Storage
# -----------------------------------------------------------------------------

action(
    type="omfile"
    file="/var/log/messages"
)

# -----------------------------------------------------------------------------
# Reliable Remote Forwarding
# -----------------------------------------------------------------------------

action(
    type="omfwd"

    target="syslog-collector.example.com"
    port="514"
    protocol="tcp"

    action.resumeRetryCount="-1"

    queue.type="LinkedList"
    queue.filename="collector-forward"

    queue.size="50000"
    queue.maxDiskSpace="2g"

    queue.saveOnShutdown="on"

    queue.highWatermark="40000"
    queue.lowWatermark="10000"
)

# -----------------------------------------------------------------------------
# End Configuration
# -----------------------------------------------------------------------------
